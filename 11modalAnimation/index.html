<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reusable Modal</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <button class="open-btn">
        Open Modal
    </button>

    <!-- Overlay -->

    <div class="modal-overlay">
        <div class="modal">
            <button class="close-btn">
                &times;
            </button>

            <h2>Modal Animation</h2>
            <p>
                Reusable optimized modal with fade,
                zoom, scale popup and slide-from-top animation.
            </p>
        </div>
    </div>

    <script src="./script.js"> </script>

</body>
</html>
